<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Bricolage Grotesque','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070c18" />
      <stop offset="100%" stop-color="#04070f" />
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="40%" r="48%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.42" />
      <stop offset="55%" stop-color="#3b82f6" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#a5d8ff" />
      <stop offset="50%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="accentText" gradientUnits="userSpaceOnUse" x1="96" y1="436" x2="610" y2="436">
      <stop offset="0%" stop-color="#a5d8ff" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#60a5fa" stroke-opacity="0.06" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- flame instrument, own column on the right -->
  <g transform="translate(1000 315)">
    <circle r="190" fill="url(#glow)" opacity="0.5" />
    <circle r="168" fill="none" stroke="rgba(140,165,210,0.28)" stroke-width="1.5" stroke-dasharray="2 13" />
    <circle r="138" fill="none" stroke="rgba(96,165,250,0.42)" stroke-width="1.5" stroke-dasharray="1 24" />
    <circle r="110" fill="none" stroke="rgba(140,165,210,0.16)" stroke-width="1.5" />
    <g transform="translate(-138 -138) scale(4.6)">
      <path d="M37 11C22 20,16 34,20 42A12 12 0 0 1 44 42C44 30,44 18,37 11Z" fill="url(#flame)" />
    </g>
  </g>

  <!-- wordmark -->
  <g transform="translate(96 120)">
    <rect width="44" height="44" rx="9" fill="#0b1f3a" />
    <g transform="translate(8 6) scale(0.45)">
      <path d="M37 11C22 20,16 34,20 42A12 12 0 0 1 44 42C44 30,44 18,37 11Z" fill="#60a5fa" />
    </g>
    <text x="60" y="32" font-size="30" font-weight="700" fill="#f0f4fb" letter-spacing="0.5">Pyrven</text>
  </g>

  <!-- headline: three short lines, clear of the flame -->
  <text font-size="70" font-weight="800" letter-spacing="-1.5" fill="#f0f4fb">
    <tspan x="96" y="272">Agents built</tspan>
    <tspan x="96" y="354">like systems</tspan>
    <tspan x="96" y="436" fill="url(#accentText)">that can't fail.</tspan>
  </text>

  <text x="96" y="496" font-family="'JetBrains Mono',monospace" font-size="20" letter-spacing="3" fill="#8c9ab8">
    AGENTIC AI CONSULTING · EVALUATION-FIRST
  </text>
</svg>
